# ─────────────────────────────────────────────────────────────────────────────
# StudyAI — Prompts & Personas
# ─────────────────────────────────────────────────────────────────────────────

# ── Personas ──────────────────────────────────────────────────────────────────
personas:

  student_analyzer:
    system_prompt: |
      You are an expert educational psychologist and learning analyst.
      Your job is to assess a student's current knowledge, identify gaps,
      and provide a concise profile that other agents can use to personalise
      their teaching. Be specific, practical, and kind.

  roadmap_creator:
    system_prompt: |
      You are a master curriculum designer with decades of experience building
      structured learning paths. You create clear, achievable roadmaps broken
      into phases with concrete milestones. Always tailor pacing to the
      student's available time and current level.

  quiz_generator:
    system_prompt: |
      You are an expert exam writer who creates high-quality, pedagogically
      sound multiple-choice questions. Each question must test genuine
      understanding — not just memorisation. Always return ONLY valid JSON,
      no preamble, no markdown fences.

  tutor_agent:
    system_prompt: |
      You are a patient, encouraging, world-class tutor. You explain concepts
      clearly, use analogies, check for understanding, and adapt your language
      to the student's level. Never make the student feel dumb. Be concise but
      thorough.

  summarizer:
    system_prompt: |
      You are an expert academic summariser. You distil lengthy content into
      clear, well-structured summaries that capture every key idea without
      losing nuance. Use plain language. Organise with headings where helpful.

  notes_writer:
    system_prompt: |
      You are an expert study notes writer. You transform content into
      well-structured, student-friendly notes optimised for revision.
      Use clear headings, bullet points, and highlight key terms.
      Notes should be comprehensive yet scannable.

  resource_finder:
    system_prompt: |
      You are an expert educational resource curator. You find the best
      free and paid resources — courses, books, videos, docs, and tools —
      for any topic. Prioritise quality and relevance over quantity.

  rag_tutor:
    system_prompt: |
      You are a precise, document-grounded tutor. You answer questions using
      ONLY the context provided from the student's uploaded documents.
      Always cite relevant sections. If the answer isn't in the documents,
      say so clearly rather than guessing.


# ── Learning Styles ───────────────────────────────────────────────────────────
learning_styles:

  visual:
    description: "Learns best through diagrams, charts, and visual representations"
    recommendations:
      - "Include diagrams and visual analogies in explanations"
      - "Suggest mind maps for complex topics"
      - "Use spatial organisation in notes"

  reading:
    description: "Learns best through reading and writing"
    recommendations:
      - "Provide detailed written explanations"
      - "Suggest books and articles"
      - "Encourage note-taking and summarisation"

  practical:
    description: "Learns best through hands-on practice and projects"
    recommendations:
      - "Include coding exercises and real-world projects"
      - "Break theory down into actionable experiments"
      - "Suggest building mini-projects at each stage"

  auditory:
    description: "Learns best through listening and discussion"
    recommendations:
      - "Suggest podcasts and lecture videos"
      - "Encourage talking through problems aloud"
      - "Use conversational explanations"


# ── Knowledge Levels ──────────────────────────────────────────────────────────
knowledge_levels:
  beginner:
    description: "No prior knowledge — needs fundamentals from scratch"
    detail_level: high
  intermediate:
    description: "Some familiarity — ready to go deeper"
    detail_level: medium
  advanced:
    description: "Strong foundation — wants expert-level depth"
    detail_level: low


# ── Subject Categories ────────────────────────────────────────────────────────
subject_categories:
  computer_science:  { icon: "💻", color: "#1a6eff" }
  mathematics:       { icon: "📐", color: "#8b5cf6" }
  science:           { icon: "🔬", color: "#10b981" }
  history:           { icon: "📜", color: "#f59e0b" }
  language:          { icon: "🗣️", color: "#ef4444" }
  business:          { icon: "📊", color: "#0ea5e9" }
  arts:              { icon: "🎨", color: "#ec4899" }
  other:             { icon: "📚", color: "#6b7280" }


# ── Prompts ───────────────────────────────────────────────────────────────────
prompts:

  student_analysis:
    base: |
      Analyse this student's learning profile and provide a concise assessment:

      TOPIC: {topic}
      CATEGORY: {subject_category}
      CURRENT LEVEL: {knowledge_level}
      LEARNING GOAL: {learning_goal}
      TIME AVAILABLE: {time_available}
      LEARNING STYLE: {learning_style}

      Provide:
      1. Current knowledge assessment
      2. Key knowledge gaps to address
      3. Recommended learning approach
      4. Realistic timeline estimate
      5. Potential challenges and how to overcome them

      Be specific and actionable.

  roadmap_creation:
    base: |
      Create a detailed, personalised learning roadmap.

      STUDENT ANALYSIS:
      {student_analysis}

      TOPIC: {topic}
      LEARNING GOAL: {learning_goal}
      TIME AVAILABLE: {time_available}
      KNOWLEDGE LEVEL: {knowledge_level}

      Structure the roadmap as phases (Phase 1, Phase 2, etc.) with:
      - Clear phase title and objective
      - Key topics/skills to cover
      - Recommended resources
      - Estimated time per phase
      - Milestone to mark completion

  resource_finding:
    base: |
      Find the best learning resources for this student.

      TOPIC: {topic}
      LEARNING GOAL: {learning_goal}
      KNOWLEDGE LEVEL: {knowledge_level}
      LEARNING STYLE: {learning_style}

      Provide a curated list of:
      - Free online resources (courses, tutorials, docs)
      - Books (with ISBN or authors)
      - Video channels or playlists
      - Practice platforms or tools
      - Communities to join

      For each resource include: name, URL/author, why it's good for this student.

  quiz_generation:
    base: |
      Generate exactly {num_questions} multiple-choice quiz questions.

      TOPIC: {topic}
      DIFFICULTY: {difficulty_level}
      FOCUS: {focus_areas}

      Return ONLY a JSON array with this exact structure, no other text:
      [
        {{
          "question": "Question text here?",
          "options": ["Option A", "Option B", "Option C", "Option D"],
          "answer": "Option A",
          "explanation": "Brief explanation of why this is correct."
        }}
      ]

      Rules:
      - All 4 options must be plausible
      - Only ONE correct answer per question
      - Test understanding, not just memorisation
      - Vary question types (definition, application, analysis)
      - Return ONLY the JSON array, nothing else

  tutoring:
    base: |
      A student is asking for help. Answer their question clearly and helpfully.

      STUDENT QUESTION: {student_question}

      ADDITIONAL CONTEXT: {context}

      STUDENT LEVEL: {knowledge_level}

      Guidelines:
      - Match explanation depth to the student's level
      - Use concrete examples and analogies
      - If it's a complex topic, break it into steps
      - End with a follow-up question or suggestion to deepen understanding
      - Keep the response focused and not overwhelming

  content_summary:
    base: |
      Summarise the following content for a student.

      TOPIC CONTEXT: {topic}
      STUDENT LEVEL: {knowledge_level}

      CONTENT TO SUMMARISE:
      {content}

      Provide a comprehensive summary that:
      1. Opens with a 2-3 sentence overview
      2. Covers all main concepts and ideas
      3. Highlights the most important points
      4. Notes any key terms or definitions
      5. Closes with key takeaways

      Write clearly for a {knowledge_level} level student.

  notes_generation:
    base: |
      Generate structured study notes from this content.

      TOPIC: {topic}
      STUDENT LEVEL: {knowledge_level}

      CONTENT:
      {content}

      Format the notes as:
      # Main Topic

      ## Key Concept 1
      - Core idea
      - Important details
      - Examples

      ## Key Concept 2
      ...

      ## Key Terms
      - **Term**: Definition

      ## Summary
      3-4 bullet points of the most critical takeaways.

      Make notes comprehensive, scannable, and revision-friendly.

  roadmap_structured:
    base: |
      Create a structured learning roadmap for this topic.

      TOPIC: {topic}
      STUDENT LEVEL: {knowledge_level}
      LEARNING GOAL: {learning_goal}
      TIME AVAILABLE: {time_available}

      Return ONLY a JSON array with this structure, no other text:
      [
        {{
          "title": "Step title",
          "description": "What to learn and do in this step.",
          "duration": "Estimated time e.g. 1 week"
        }}
      ]

      Create 6-8 logical steps from beginner foundations to the learning goal.
      Return ONLY the JSON array.

  rag_query:
    base: |
      Answer the student's question using ONLY the provided document excerpts.

      QUESTION: {question}

      DOCUMENT EXCERPTS:
      {context}

      Instructions:
      - Answer using ONLY information from the excerpts above
      - Quote or paraphrase relevant sections
      - If the answer spans multiple excerpts, synthesise them
      - If the information isn't in the excerpts, say: "This specific information wasn't found in your documents."
      - Be clear, structured, and educational in your response